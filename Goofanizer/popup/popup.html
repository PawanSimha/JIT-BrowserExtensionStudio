<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Responsive Device Switcher</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div id="app">
  <header>
    <div class="header-top">
      <div class="header-brand">
        <span class="header-brand-icon material-symbols-outlined">devices</span>
        <span class="header-title">Device Switcher</span>
      </div>
      <span id="statusBadge" class="badge idle">Inactive</span>
    </div>
    <div class="header-sub">
      <div class="current-device" id="currentDevice">
        <span class="device-dot" id="deviceDot"></span>
        <span class="device-label">Active:</span>
        <span class="device-name" id="deviceName">None</span>
        <span class="device-dims" id="deviceDims"></span>
      </div>
      <input type="text" id="searchInput" placeholder="Filter devices..." aria-label="Filter devices">
    </div>
  </header>

  <section id="section-mobile">
    <div class="section-title">
      <span class="material-symbols-outlined section-title-icon">smartphone</span>
      Phones
      <span id="mobileCount"></span>
    </div>
    <div class="card-grid" id="mobileGrid"></div>
  </section>

  <section id="section-tablet">
    <div class="section-title">
      <span class="material-symbols-outlined section-title-icon">tablet</span>
      Tablets
      <span id="tabletCount"></span>
    </div>
    <div class="card-grid" id="tabletGrid"></div>
  </section>

  <section id="section-controls">
    <div class="controls-row">
      <button id="rotateBtn" class="btn btn-icon" title="Toggle portrait/landscape" disabled>
        <span class="material-symbols-outlined">screen_rotation</span>
        Rotate
      </button>
      <button id="screenshotBtn" class="btn btn-icon" title="Capture screenshot of current viewport">
        <span class="material-symbols-outlined">camera_alt</span>
        Screenshot
      </button>
      <button id="exportBtn" class="btn btn-icon" title="Export screenshots for all device presets">
        <span class="material-symbols-outlined">archive</span>
        Export
      </button>
      <button id="resetBtn" class="btn btn-icon btn-danger-icon" title="Reset to original viewport" disabled>
        <span class="material-symbols-outlined">restart_alt</span>
        Reset
      </button>
    </div>
  </section>

  <div class="window-hint">Drag to move &middot; Drag edges to resize</div>
</div>
<script src="../utils/devices.js"></script>
<script src="popup.js"></script>
</body>
</html>
